<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Celebration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #e91e63;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            border-left: 5px solid #e91e63;
        }

        .section h2 {
            color: #e91e63;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            color: #333;
            font-weight: bold;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="file"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #e91e63;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
        }

        .btn-secondary {
            background: #667eea;
            color: white;
        }

        .btn-secondary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 10px;
            border: 3px solid #e91e63;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mom-section {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .mom-info {
            flex: 1;
            min-width: 250px;
        }

        .mom-photo {
            text-align: center;
        }

        .kids-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .kid-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #ddd;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .kid-card:hover {
            border-color: #e91e63;
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.2);
        }

        .kid-card h3 {
            color: #e91e63;
            margin-bottom: 10px;
        }

        .kid-photo {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            margin: 10px 0;
            border: 2px solid #e91e63;
        }

        .message-display {
            background: linear-gradient(135deg, #e91e63, #764ba2);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.3);
            position: relative;
            overflow: hidden;
        }

        .message-display:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(233, 30, 99, 0.4);
        }

        .message-display::before {
            content: '💝';
            font-size: 3em;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message-text {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .click-hint {
            font-size: 0.9em;
            opacity: 0.9;
            text-decoration: underline;
        }

        .message-photo {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 15px;
            border: 3px solid white;
        }

        .family-list {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .family-list h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .family-member {
            padding: 8px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .family-member span {
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .mom-section {
                flex-direction: column;
            }

            .message-display {
                padding: 25px;
                min-height: 150px;
            }

            .message-text {
                font-size: 1.3em;
            }

            .kids-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌹 Mother's Day Celebration 🌹</h1>
        <p class="subtitle">Create a beautiful Mother's Day message with photos</p>

        <!-- Mom Section -->
        <div class="section">
            <h2>👩 Mom's Information</h2>
            <div class="mom-section">
                <div class="mom-info">
                    <div class="input-group">
                        <label for="momName">Mom's Name:</label>
                        <input type="text" id="momName" placeholder="Enter mom's name" value="Mom">
                    </div>
                    <div class="input-group">
                        <label for="momPhoto">Mom's Photo:</label>
                        <input type="file" id="momPhoto" accept="image/*">
                    </div>
                </div>
                <div class="mom-photo">
                    <img id="momPhotoPreview" class="photo-preview" src="https://via.placeholder.com/150?text=Mom" alt="Mom's photo">
                </div>
            </div>
        </div>

        <!-- Kids Section -->
        <div class="section">
            <h2>👶 Add Kids</h2>
            <div class="input-group">
                <label for="kidName">Kid's Name:</label>
                <input type="text" id="kidName" placeholder="Enter kid's name">
            </div>
            <div class="input-group">
                <label for="kidPhoto">Kid's Photo:</label>
                <input type="file" id="kidPhoto" accept="image/*">
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="addKid()">➕ Add Kid</button>
                <button class="btn-secondary" onclick="resetForm()">🔄 Reset Form</button>
            </div>

            <!-- Kids List -->
            <div class="kids-container" id="kidsList"></div>

            <!-- Family List -->
            <div class="family-list">
                <h3>👨‍👩‍👧‍👦 Family Members</h3>
                <div id="familyList"></div>
            </div>
        </div>

        <!-- Message Display -->
        <div class="message-display" onclick="nextMessage()">
            <div class="message-text" id="messageText">Happy Mother's Day!</div>
            <img id="messagePhoto" class="message-photo" style="display:none;" alt="Photo">
            <div class="click-hint">Click to see messages from each family member</div>
        </div>
    </div>

    <script>
        let kids = [];
        let momPhoto = null;
        let currentMessageIndex = 0;

        // Handle mom photo upload
        document.getElementById('momPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    momPhoto = event.target.result;
                    document.getElementById('momPhotoPreview').src = momPhoto;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle kid photo upload
        let kidPhotoData = null;
        document.getElementById('kidPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    kidPhotoData = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function addKid() {
            const kidName = document.getElementById('kidName').value.trim();
            if (kidName === '') {
                alert('Please enter a kid\'s name!');
                return;
            }

            kids.push({
                name: kidName,
                photo: kidPhotoData
            });

            // Reset form
            document.getElementById('kidName').value = '';
            document.getElementById('kidPhoto').value = '';
            kidPhotoData = null;

            renderKids();
            updateFamilyList();
        }

        function removeKid(index) {
            kids.splice(index, 1);
            renderKids();
            updateFamilyList();
        }

        function renderKids() {
            const kidsList = document.getElementById('kidsList');
            kidsList.innerHTML = '';

            kids.forEach((kid, index) => {
                const kidCard = document.createElement('div');
                kidCard.className = 'kid-card';
                kidCard.innerHTML = `
                    <h3>${kid.name}</h3>
                    ${kid.photo ? `<img src="${kid.photo}" class="kid-photo" alt="${kid.name}">` : `<img src="https://via.placeholder.com/120?text=${kid.name}" class="kid-photo" alt="${kid.name}">`}
                    <button class="btn-danger" onclick="removeKid(${index})">❌ Remove</button>
                `;
                kidsList.appendChild(kidCard);
            });
        }

        function updateFamilyList() {
            const familyList = document.getElementById('familyList');
            familyList.innerHTML = '';

            const momName = document.getElementById('momName').value || 'Mom';
            const momMember = document.createElement('div');
            momMember.className = 'family-member';
            momMember.innerHTML = `<span>👩 ${momName}</span>`;
            familyList.appendChild(momMember);

            kids.forEach((kid, index) => {
                const kidMember = document.createElement('div');
                kidMember.className = 'family-member';
                kidMember.innerHTML = `<span>👶 ${kid.name}</span>`;
                familyList.appendChild(kidMember);
            });
        }

        function nextMessage() {
            const momName = document.getElementById('momName').value || 'Mom';
            const messageText = document.getElementById('messageText');
            const messagePhoto = document.getElementById('messagePhoto');

            if (currentMessageIndex === 0) {
                // Show mom's message
                messageText.textContent = `Happy Mother's Day ${momName}! 🌹`;
                if (momPhoto) {
                    messagePhoto.src = momPhoto;
                    messagePhoto.style.display = 'block';
                } else {
                    messagePhoto.style.display = 'none';
                }
            } else if (currentMessageIndex <= kids.length) {
                // Show kid's message
                const kidIndex = currentMessageIndex - 1;
                const kid = kids[kidIndex];
                messageText.textContent = `From your child: ${kid.name} 💝`;
                if (kid.photo) {
                    messagePhoto.src = kid.photo;
                    messagePhoto.style.display = 'block';
                } else {
                    messagePhoto.style.display = 'none';
                }
            }

            // Cycle through messages
            currentMessageIndex = (currentMessageIndex + 1) % (kids.length + 1);
        }

        function resetForm() {
            document.getElementById('momName').value = 'Mom';
            document.getElementById('momPhoto').value = '';
            document.getElementById('momPhotoPreview').src = 'https://via.placeholder.com/150?text=Mom';
            document.getElementById('kidName').value = '';
            document.getElementById('kidPhoto').value = '';
            kids = [];
            momPhoto = null;
            kidPhotoData = null;
            currentMessageIndex = 0;
            renderKids();
            updateFamilyList();
            document.getElementById('messageText').textContent = 'Happy Mother\'s Day!';
            document.getElementById('messagePhoto').style.display = 'none';
        }

        // Initialize
        updateFamilyList();
    </script>
</body>
</html>
