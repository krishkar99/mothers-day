<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Gift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #e91e63, #ff69b4);
            clip-path: polygon(50% 100%, 0% 62%, 0% 27%, 50% 0%, 100% 27%, 100% 62%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(233, 30, 99, 0.5);
            transition: all 0.3s ease;
        }

        .heart:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(233, 30, 99, 0.7);
        }

        .heart img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .heart-placeholder {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            font-size: 80px;
        }

        .message {
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .click-instruction {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            margin-top: 20px;
            font-style: italic;
        }

        .counter {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 10px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .heart.active {
            animation: pulse 0.5s ease;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
                margin-bottom: 20px;
            }

            .heart-container {
                width: 250px;
                height: 250px;
                margin: 0 auto 30px;
            }

            .heart {
                width: 250px;
                height: 250px;
            }

            .heart img,
            .heart-placeholder {
                width: 230px;
                height: 230px;
            }

            .message {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💝 Mother's Day Gift 💝</h1>
        
        <div class="heart-container" onclick="nextClick()">
            <div class="heart" id="heart">
                <div class="heart-placeholder">❤️</div>
            </div>
        </div>

        <div class="message" id="message">
            <div>Click the heart to see the gift!</div>
        </div>
        
        <div class="click-instruction">
            👆 Click the heart to reveal the memories
        </div>
        
        <div class="counter" id="counter"></div>
    </div>

    <script>
        let clickCount = 0;
        let maxClicks = 2;

        // Photo URLs from Imgur
        const momPhoto = 'https://i.imgur.com/zQuiDKR.jpeg';
        const familyPhoto = 'https://i.imgur.com/OdVJpV3.jpeg?1';

        const messages = [
            "Click the heart to see the gift!",
            "Happy Mother's Day! 🌹",
            "Our whole family loves you! 👨‍👩‍👧‍👦"
        ];

        function nextClick() {
            clickCount++;
            const heart = document.getElementById('heart');
            
            // Add pulse animation
            heart.classList.add('active');
            setTimeout(() => heart.classList.remove('active'), 500);

            // Update display based on click count
            if (clickCount === 1) {
                showImage(momPhoto);
                document.getElementById('message').textContent = messages[1];
            } else if (clickCount === 2) {
                showFamily();
                document.getElementById('message').textContent = messages[2];
            } else {
                resetHeart();
            }

            // Update counter
            const counter = clickCount % (maxClicks + 1);
            if (counter !== 0) {
                document.getElementById('counter').textContent = `Click ${counter} of ${maxClicks}`;
            } else {
                document.getElementById('counter').textContent = '';
            }
        }

        function showImage(photoUrl) {
            const heart = document.getElementById('heart');
            heart.innerHTML = `<img src="${photoUrl}" alt="Photo" onerror="this.src='https://via.placeholder.com/280?text=Photo'">`;
        }

        function showFamily() {
            const heart = document.getElementById('heart');
            heart.style.background = 'linear-gradient(135deg, #e91e63, #ff69b4)';
            heart.innerHTML = `<img src="${familyPhoto}" alt="Family" style="width: 280px; height: 280px; border-radius: 50%; object-fit: cover; border: 5px solid white;">`;
        }

        function resetHeart() {
            clickCount = 0;
            const heart = document.getElementById('heart');
            heart.style.background = 'linear-gradient(135deg, #e91e63, #ff69b4)';
            heart.innerHTML = '<div class="heart-placeholder">❤️</div>';
            document.getElementById('message').textContent = messages[0];
            document.getElementById('counter').textContent = '';
        }
    </script>
</body>
</html>
